var _hapticCtx = null;
function triggerHaptic(correct) {
  // Android
  if (navigator.vibrate) { navigator.vibrate(correct ? 50 : [50, 80, 50]); return; }
  // iOS: play 1-sample silent AudioBuffer — triggers Taptic Engine on iPhone
  try {
    if (!_hapticCtx) _hapticCtx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = _hapticCtx;
    function tap(delay) {
      var buf = ctx.createBuffer(1, 1, 22050);
      var src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination);
      src.start(ctx.currentTime + (delay || 0));
    }
    tap(0);
    if (!correct) tap(0.13);
  } catch(e) {}
}

var QUESTIONS = [
  {q:"In what year was frog founded?",o:["1965","1969","1972","1976"],a:1,e:"Hartmut Esslinger founded what would become frog in 1969 in the Black Forest region of Germany."},
  {q:"Who founded frog?",o:["Dieter Rams","Hartmut Esslinger","Jony Ive","Raymond Loewy"],a:1,e:"Hartmut Esslinger, born in the Black Forest region of Germany, founded the company alongside Patricia Roller."},
  {q:"What does the acronym 'frog' stand for?",o:["Future Research in Organic Graphics","Federal Republic of Germany","Form Requires Original Genius","Foundations of Revolutionary Design"],a:1,e:"The name frog is derived from 'Federal Republic of Germany,' Esslinger's home country."},
  {q:"What was frog originally named when it was founded?",o:["frog design","Esslinger Design","Black Forest Studio","Form + Function"],a:1,e:"The company started as 'Esslinger Design' before being renamed to 'frog design' in 1982."},
  {q:"In which region of Germany was frog originally established?",o:["Bavaria","The Black Forest","The Rhineland","Berlin"],a:1,e:"Frog was founded in Mutlangen, in the Black Forest (Schwarzwald) region of Germany."},
  {q:"Why is frog always written in lowercase?",o:["A printing error that stuck","Democratic stance against German grammar rules","The founder preferred minimalism","Required by trademark law"],a:1,e:"The lowercase styling was a deliberate rebellion against German grammatical rules that capitalize all nouns, expressing frog's democratic workplace ethos."},
  {q:"In what year was the company renamed from 'Esslinger Design' to 'frog design'?",o:["1976","1979","1982","1985"],a:2,e:"The name changed to 'frog design' in 1982, the same year Esslinger signed his landmark contract with Apple."},
  {q:"Where was Hartmut Esslinger born?",o:["Munich","Beuren, Black Forest","Vienna","Stuttgart"],a:1,e:"Esslinger was born on June 5, 1944, in Beuren (Simmersfeld), in the Black Forest region of Germany."},
  {q:"What design school did Hartmut Esslinger attend?",o:["Bauhaus Dessau","Royal College of Art","HfG Schwäbisch Gmünd","Parsons"],a:2,e:"Esslinger studied at the Hochschule fur Gestaltung Schwabisch Gmund, finishing his studies at age 25."},
  {q:"Esslinger was featured on the cover of which major magazine in December 1990?",o:["Time","Wired","BusinessWeek","Fortune"],a:2,e:"BusinessWeek featured Esslinger with the headline 'Rebel With A Cause' — he was the only living designer honored on that cover since Raymond Loewy in 1934."},
  {q:"What famous phrase did Hartmut Esslinger coin to counter 'form follows function'?",o:["Form follows feeling","Form follows emotion","Form follows the user","Form follows beauty"],a:1,e:"'Form follows emotion' was Esslinger's challenge to Louis Sullivan's functionalist motto, arguing that humans need deeper emotional meaning in product design."},
  {q:"Who co-founded frog alongside Hartmut Esslinger?",o:["Steve Jobs","Patricia Roller","Dieter Rams","Herbert Pfeifer"],a:1,e:"Patricia Roller co-founded the company with Esslinger and served as co-CEO until their retirement in 2006."},
  {q:"In what year did Steve Jobs and Hartmut Esslinger first meet?",o:["1979","1980","1982","1984"],a:2,e:"Jobs and Esslinger first met in January 1982, beginning one of the most influential designer-CEO partnerships in tech history."},
  {q:"What was the name of Apple's design competition that frog won?",o:["Project Macintosh","Snow White","Project Renaissance","California Dream"],a:1,e:"The 'Snow White' design competition (named after the seven dwarves for seven product lines) ran from July 1982 to February 1983. Frog won over British firm BIB."},
  {q:"How much was frog's annual contract with Apple reportedly worth?",o:["$500K/year","$1M/year","$2M/year","$5M/year"],a:2,e:"Esslinger entered an exclusive contract with Apple worth approximately $2 million per year, a groundbreaking sum that signaled design's strategic value."},
  {q:"What Apple product designed by frog was voted 'Design of the Year' by Time magazine?",o:["Macintosh 128K","Apple IIc","Apple Lisa","Apple IIe"],a:1,e:"The Apple IIc (1984) was voted Design of the Year by Time magazine and its original was later acquired by the Whitney Museum of Art."},
  {q:"What were the characteristic visual features of the Snow White design language?",o:["Colorful translucent plastics","Shallow grooves on light-colored enclosures","Brushed aluminum surfaces","Rounded corners with rubber grips"],a:1,e:"Snow White featured off-white or light gray colors with shallow grooves (2mm wide, 2mm deep, spaced 10mm apart) and zero-draft enclosures."},
  {q:"What did Esslinger submit to win the Snow White competition?",o:["A Macintosh scale model","The 'Red Book' of inspirations","A working Apple IIc prototype","A video presentation"],a:1,e:"Esslinger won by submitting the 'Red Book' — a binder of design inspirations drawn from Walt Disney cartoons and Sony Trinitron televisions."},
  {q:"After Steve Jobs left Apple, what did Esslinger do?",o:["Stayed at Apple","Broke his contract and followed Jobs to NeXT","Returned to Germany","Joined IBM"],a:1,e:"In a remarkable show of loyalty, Esslinger broke his lucrative Apple contract and followed Jobs to design for NeXT Computer."},
  {q:"How many product lines did Apple's Snow White competition require designs for?",o:["Three","Five","Seven","Ten"],a:2,e:"The competition required designs for seven product lines — hence the 'Snow White and the Seven Dwarfs' codename."},
  {q:"What was unique about the NeXT Computer's physical form?",o:["Triangular","A perfect one-foot cube","The thinnest computer ever made","Completely spherical"],a:1,e:"The NeXT Computer was designed as a mathematically perfect cube, exactly one foot on each side — beautiful but a nightmare to manufacture."},
  {q:"What was frog's first major client?",o:["Apple","Sony","WEGA","Braun"],a:2,e:"WEGA, a German consumer electronics company, was frog's first major client. Frog designed their first color TV without a wood frame."},
  {q:"Which major electronics company acquired WEGA in 1974, leading to frog's international expansion?",o:["Philips","Samsung","Sony","Panasonic"],a:2,e:"Sony acquired WEGA in 1974 and subsequently hired Esslinger to create a global design image, leading to work on 100+ Sony products."},
  {q:"What nickname was given to the Sun SPARCstation 1 designed by frog?",o:["The Cube","The Pizza Box","The Slab","The Wedge"],a:1,e:"The SPARCstation 1's distinctive 3-inch height earned it the 'pizza box' nickname. It sold 120,000 units in its first 18 months."},
  {q:"What was the Yamaha FZ750 motorcycle concept designed by frog called?",o:["The Dart","The Rana","The Wave","The Blade"],a:1,e:"'The Rana' — meaning 'frog' in Latin — was a clever nod to the company name. The prototype was later donated to SFMOMA."},
  {q:"What Disney product did frog help design?",o:["Disney+ streaming interface","MagicBand wristband","Disneyland mobile app","Disney Infinity figures"],a:1,e:"Frog was the lead design partner for Disney's MagicBand and MyMagic+ system — an RFID bracelet connecting park tickets, hotel keys, payments, and PhotoPass."},
  {q:"What SAP product did frog help redesign with a human-centered approach?",o:["SAP HANA","SAP Fiori","SAP SuccessFactors","SAP Ariba"],a:1,e:"Frog led the radically human-centered redesign of SAP Fiori, transforming SAP's flagship enterprise application."},
  {q:"Approximately how many Sony products did frog design during their partnership?",o:["About 25","About 50","Over 100","Over 200"],a:2,e:"Frog designed over 100 products for Sony, emphasizing high-tech minimalism and ergonomic appeal across their entire product range."},
  {q:"Which museum acquired the original Apple IIc?",o:["MoMA","The Smithsonian","Whitney Museum of Art","Cooper Hewitt"],a:2,e:"The original Apple IIc was acquired by the Whitney Museum of Art in New York, recognizing its significance as both technology and design."},
  {q:"Which frog-designed Apple product is in MoMA's permanent collection?",o:["Apple IIc","Macintosh SE","Apple Lisa","Power Mac G3"],a:1,e:"The Macintosh SE (1987, designed 1984) is part of MoMA's permanent collection in New York."},
  {q:"Who acquired frog from its founders in 2004?",o:["Capgemini","Accenture","Flextronics","McKinsey"],a:2,e:"Hartmut Esslinger and Patricia Roller sold their majority stake to Flextronics for approximately $25 million in 2004."},
  {q:"Which private equity firm acquired frog as part of a $900 million deal in 2006?",o:["Bain Capital","KKR","Blackstone","Carlyle Group"],a:1,e:"KKR (Kohlberg Kravis Roberts) acquired frog as part of their $900 million acquisition of Flextronics' software companies."},
  {q:"Frog is currently part of which global consulting firm?",o:["Deloitte","Accenture","Capgemini","McKinsey"],a:2,e:"Frog became part of Capgemini Invent in 2021, after Capgemini acquired Altran (which owned Aricent, which owned frog)."},
  {q:"In what year did frog rebrand from 'frog design' to simply 'frog'?",o:["2005","2008","2011","2015"],a:2,e:"In 2011, the company dropped 'design' from its name to signify its expanded portfolio beyond design into strategy, services, and organization activation."},
  {q:"In what year did frog celebrate its 50th anniversary?",o:["2015","2017","2019","2021"],a:2,e:"Frog celebrated frog50 in 2019, commemorating its 1969 founding with traveling exhibitions featuring 50 iconic products."},
  {q:"What did frog's 50th anniversary exhibition feature?",o:["A documentary film","50 products & a 24-foot video wall","A redesigned website","A coffee table book"],a:1,e:"The frog50 exhibition featured 50 iconic products, a 24-foot-wide video wall with an animated timeline, and an AR wall with image-tracking."},
  {q:"What famous designer played a similar role at Braun to what Esslinger played at Apple?",o:["Charles Eames","Philippe Starck","Dieter Rams","Massimo Vignelli"],a:2,e:"Steve Jobs sought a 'world-class designer' similar to the role Dieter Rams played for Braun. Esslinger filled that role for Apple."},
  {q:"What formula did Esslinger propose for business success through design?",o:["Design + Engineering = Innovation","Culture + Process = Profits","Vision + Execution = Growth","Art + Science = Products"],a:1,e:"Esslinger's formula 'Culture + Process = Profits' encapsulates his belief that design-led culture drives business results."},
  {q:"Which Louis Sullivan principle did Esslinger famously challenge?",o:["Less is more","Form follows function","God is in the details","Ornament is crime"],a:1,e:"Esslinger challenged Sullivan's 'form follows function' with his own 'form follows emotion,' arguing that humans require deeper meaning in design."},
  {q:"What is the title of Esslinger's book about his work with Apple?",o:["Designed by Apple","Keep It Simple","The Apple Way","Think Different"],a:1,e:"'Keep It Simple: The Early Design Years of Apple' was published in 2014 with 380 illustrations showing the step-by-step development of Apple's brand."},
  {q:"What is the title of Esslinger's book about design and business strategy?",o:["Design Thinking","A Fine Line","By Design","Creative Confidence"],a:1,e:"'A Fine Line: How Design Strategies Are Shaping the Future of Business' draws on Esslinger's 40+ years of experience building world-renowned brands."},
  {q:"What award was the Sony Trinitron the first consumer electronics device to win?",o:["A Grammy","An Emmy","An Oscar","A Golden Globe"],a:1,e:"The Sony Trinitron won an Emmy Award in 1973 — the first consumer electronics device ever to receive one."},
  {q:"Why did Esslinger move frog to Silicon Valley in the early 1980s?",o:["Lower taxes","Proximity to Apple","Better weather","Access to venture capital"],a:1,e:"Esslinger relocated to Palo Alto, California to be close to Apple, his most important client at the time."},
  {q:"Since 1934, Esslinger was only the second living designer featured on the cover of BusinessWeek. Who was the first?",o:["Henry Dreyfuss","Raymond Loewy","Walter Gropius","Charles Eames"],a:1,e:"Raymond Loewy was featured in 1934. It took 56 years before another living designer — Esslinger — received that honor in 1990."},
  {q:"Which museum received frog's Yamaha 'The Rana' motorcycle prototype?",o:["MoMA","Whitney Museum","SFMOMA","Design Museum London"],a:2,e:"The Yamaha FZ750 'The Rana' prototype was donated to SFMOMA's permanent collection in 2012."},
  {q:"How many major museums hold frog-designed objects in their permanent collections?",o:["One","Two","Three","Four"],a:2,e:"At least three major museums hold frog designs: the Whitney (Apple IIc), MoMA (Macintosh SE), and SFMOMA (Yamaha 'The Rana')."},
  {q:"Which design school did Esslinger co-found as a professor in 1989?",o:["Bauhaus Weimar","HfG Karlsruhe","Royal College of Art","Domus Academy"],a:1,e:"Esslinger co-founded the Hochschule fur Gestaltung Karlsruhe in 1989, serving as founding professor."},
  {q:"At which university did Esslinger teach convergent design from 2005 to 2011?",o:["MIT","Stanford","University of Applied Arts Vienna","Parsons"],a:2,e:"Esslinger was Professor of Convergent Design at the University of Applied Arts Vienna, Austria from 2005 to 2011."},
  {q:"What inspired the designs in Esslinger's winning 'Red Book' for Apple?",o:["Bauhaus furniture & Swiss watches","Disney cartoons & Sony Trinitron TVs","Italian sports cars & Scandinavian furniture","Japanese gardens & German engineering"],a:1,e:"The Red Book contained design inspirations drawn from Walt Disney cartoons and Sony Trinitron televisions — an unexpected combination that won Jobs over."},

  {q:"How many units did the frog-designed Sun SPARCstation 1 sell in its first 18 months?",o:["12,000","50,000","120,000","500,000"],a:2,e:"The SPARCstation 1 with its distinctive 'pizza box' design sold 120,000 units in its first 18 months — a remarkable success."},
  {q:"What year was the NeXT Computer unveiled?",o:["1986","1987","1988","1989"],a:2,e:"The NeXT Computer was unveiled on October 12, 1988, at a private gala in San Francisco."},

  {q:"What color scheme defined Apple's Snow White design language?",o:["Jet black and chrome","Off-white (Fog) or light gray (Platinum)","Beige and brown","Navy blue and silver"],a:1,e:"Snow White featured light off-white called 'Fog' or light gray called 'Platinum' as its signature color palette."},

  {q:"What technology did the Disney MagicBand use?",o:["Bluetooth","NFC","RFID","GPS"],a:2,e:"The MagicBand used RFID technology to connect park tickets, hotel room keys, payments, and PhotoPass into a single wearable experience."},

  {q:"What medical diagnostics device did frog design that won the 2021 Red Dot Award?",o:["GlucoTrack sensor","MeMed Key","Dexcom G7","Abbott FreeStyle"],a:1,e:"The MeMed Key — a rapid point-of-care device that distinguishes bacterial from viral infections in 15 minutes (down from 2 hours) — won the Red Dot Award for Product Design in 2021."},
  {q:"What was the primary innovation of the MeMed Key device designed by frog?",o:["Wireless glucose monitoring","Cutting infection test time from 2 hrs to 15 min","Real-time cancer screening","Portable MRI imaging"],a:1,e:"MeMed Key dramatically shortened infection diagnostics from ~2 hours to 15 minutes, helping clinicians prescribe antibiotics correctly and combat antimicrobial resistance."},
  {q:"What Turkish bank did frog design a super-app for, winning iF and Red Dot awards?",o:["Akbank","Garanti BBVA","Odeabank","Yapı Kredi"],a:2,e:"Frog designed Odeabank's Odea App — a super-app integrating banking, wealth management, robo-advisors, and trading — winning both the 2023 Red Dot Award and 2024 iF Award."},
  {q:"What Mexican fintech did frog rebrand in 2022, winning Fast Company's Innovation by Design Award?",o:["Clip","Kueski","Konfío","Bitso"],a:2,e:"Frog rebranded Konfío, a $1.3B-valuation Mexican fintech serving 70,000+ businesses. The redesign drove a 40% increase in users for their flagship corporate credit card."},
  {q:"What UN agency did frog partner with to build the Humanitarian Data Exchange (HDX) platform?",o:["UNICEF","UN OCHA","UNHCR","UNESCO"],a:1,e:"Frog worked with the UN Office for the Coordination of Humanitarian Affairs (OCHA) to build HDX — a platform used by 100,000+ users from 200+ locations to share crisis data, including during the Ebola outbreak and Nepal earthquake."},
  {q:"What energy-efficient home appliance did frog design through frogVentures for Heatworks, winning a 2018 Red Dot Award?",o:["A solar-powered dishwasher","A tankless electric water heater","A smart HVAC controller","An induction cooktop"],a:1,e:"Frog designed the MODEL 3 by Heatworks — a 99% energy-efficient, internet-connected tankless electric water heater that cuts water heating costs by ~40%, winning the 2018 Red Dot Award."},
  {q:"What Italian bank did frog redesign the branch experience for, rolling out across 1,000+ locations?",o:["UniCredit","Banca Monte dei Paschi","Intesa Sanpaolo","Mediobanca"],a:2,e:"Frog redesigned the branch experience for Intesa Sanpaolo using 60+ hours of interviews and 70 hours of collaborative workshops. 50 branches launched in 2015, with 1,000+ more to follow."},
  {q:"What was the name of frog's venture design arm that co-created and invested in startups?",o:["frogLabs","frogVentures","frogX","frogStudio"],a:1,e:"frogVentures was frog's co-creation and investment arm, backing startups like New Matter (3D printing), Heatworks (water heaters), and Kidaptive (adaptive learning), providing both design and equity partnerships."},
  {q:"What educational toy ecosystem did frog create from its Shanghai studio, winning an IDEA 2016 award?",o:["Osmo Genius","Yibu Play","littleBits","Tegu Blocks"],a:1,e:"Yibu Play — born from frogLabs in Shanghai — combined a digital tablet app with five wooden sensor-embedded toys that sense light, sound, direction, wind, and temperature, winning top honors at the IDSA IDEA 2016 awards."},

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
