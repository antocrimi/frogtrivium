var QUESTIONS = [
  {q:"In what year was frog founded?",o:["1965","1969","1972","1976"],a:1,e:"Hartmut Esslinger founded what would become frog in 1969 in the Black Forest region of Germany."},
  {q:"Who founded frog?",o:["Dieter Rams","Hartmut Esslinger","Jony Ive","Raymond Loewy"],a:1,e:"Hartmut Esslinger, born in the Black Forest region of Germany, founded the company alongside Patricia Roller."},
  {q:"What does the acronym 'frog' stand for?",o:["Future Research in Organic Graphics","Federal Republic of Germany","Form Requires Original Genius","Foundations of Revolutionary Global design"],a:1,e:"The name frog is derived from 'Federal Republic of Germany,' Esslinger's home country."},
  {q:"What was frog originally named when it was founded?",o:["frog design","Esslinger Design","Black Forest Studio","Form + Function"],a:1,e:"The company started as 'Esslinger Design' before being renamed to 'frog design' in 1982."},
  {q:"In which region of Germany was frog originally established?",o:["Bavaria","The Black Forest","The Rhineland","Berlin"],a:1,e:"Frog was founded in Mutlangen, in the Black Forest (Schwarzwald) region of Germany."},
  {q:"Why is frog always written in lowercase?",o:["It was a printing error that stuck","As a democratic statement against German capitalization rules","The founder preferred minimalism","It was required by trademark law"],a:1,e:"The lowercase styling was a deliberate rebellion against German grammatical rules that capitalize all nouns, expressing frog's democratic workplace ethos."},
  {q:"In what year was the company renamed from 'Esslinger Design' to 'frog design'?",o:["1976","1979","1982","1985"],a:2,e:"The name changed to 'frog design' in 1982, the same year Esslinger signed his landmark contract with Apple."},
  {q:"Where was Hartmut Esslinger born?",o:["Munich, Germany","Beuren, Black Forest, Germany","Vienna, Austria","Stuttgart, Germany"],a:1,e:"Esslinger was born on June 5, 1944, in Beuren (Simmersfeld), in the Black Forest region of Germany."},
  {q:"What design school did Hartmut Esslinger attend?",o:["Bauhaus Dessau","Royal College of Art","Hochschule fur Gestaltung Schwabisch Gmund","Parsons School of Design"],a:2,e:"Esslinger studied at the Hochschule fur Gestaltung Schwabisch Gmund, finishing his studies at age 25."},
  {q:"Esslinger was featured on the cover of which major magazine in December 1990?",o:["Time","Wired","BusinessWeek","Fortune"],a:2,e:"BusinessWeek featured Esslinger with the headline 'Rebel With A Cause' — he was the only living designer honored on that cover since Raymond Loewy in 1934."},
  {q:"What famous phrase did Hartmut Esslinger coin to counter 'form follows function'?",o:["Form follows feeling","Form follows emotion","Form follows the user","Form follows beauty"],a:1,e:"'Form follows emotion' was Esslinger's challenge to Louis Sullivan's functionalist motto, arguing that humans need deeper emotional meaning in product design."},
  {q:"Who co-founded frog alongside Hartmut Esslinger?",o:["Steve Jobs","Patricia Roller","Dieter Rams","Herbert Pfeifer"],a:1,e:"Patricia Roller co-founded the company with Esslinger and served as co-CEO until their retirement in 2006."},
  {q:"In what year did Steve Jobs and Hartmut Esslinger first meet?",o:["1979","1980","1982","1984"],a:2,e:"Jobs and Esslinger first met in January 1982, beginning one of the most influential designer-CEO partnerships in tech history."},
  {q:"What was the name of Apple's design competition that frog won?",o:["Project Macintosh","Snow White","Project Renaissance","California Dream"],a:1,e:"The 'Snow White' design competition (named after the seven dwarves for seven product lines) ran from July 1982 to February 1983. Frog won over British firm BIB."},
  {q:"How much was frog's annual contract with Apple reportedly worth?",o:["$500,000 per year","$1 million per year","$2 million per year","$5 million per year"],a:2,e:"Esslinger entered an exclusive contract with Apple worth approximately $2 million per year, a groundbreaking sum that signaled design's strategic value."},
  {q:"What Apple product designed by frog was voted 'Design of the Year' by Time magazine?",o:["Macintosh 128K","Apple IIc","Apple Lisa","Apple IIe"],a:1,e:"The Apple IIc (1984) was voted Design of the Year by Time magazine and its original was later acquired by the Whitney Museum of Art."},
  {q:"What were the characteristic visual features of the Snow White design language?",o:["Colorful translucent plastics","Shallow horizontal and vertical lines on light-colored enclosures","Brushed aluminum surfaces","Rounded corners with rubber grips"],a:1,e:"Snow White featured off-white or light gray colors with shallow grooves (2mm wide, 2mm deep, spaced 10mm apart) and zero-draft enclosures."},
  {q:"What did Esslinger submit to win the Snow White competition?",o:["A scale model of the Macintosh","The 'Red Book' of design inspirations","A working prototype of Apple IIc","A video presentation"],a:1,e:"Esslinger won by submitting the 'Red Book' — a binder of design inspirations drawn from Walt Disney cartoons and Sony Trinitron televisions."},
  {q:"After Steve Jobs left Apple, what did Esslinger do?",o:["Stayed at Apple","Broke his contract with Apple and followed Jobs to NeXT","Returned to Germany","Joined IBM"],a:1,e:"In a remarkable show of loyalty, Esslinger broke his lucrative Apple contract and followed Jobs to design for NeXT Computer."},
  {q:"How many product lines did Apple's Snow White competition require designs for?",o:["Three","Five","Seven","Ten"],a:2,e:"The competition required designs for seven product lines — hence the 'Snow White and the Seven Dwarfs' codename."},
  {q:"What was unique about the NeXT Computer's physical form?",o:["It was triangular","It was a perfect one-foot cube","It was the thinnest computer ever made","It was completely spherical"],a:1,e:"The NeXT Computer was designed as a mathematically perfect cube, exactly one foot on each side — beautiful but a nightmare to manufacture."},
  {q:"What was frog's first major client?",o:["Apple","Sony","WEGA","Braun"],a:2,e:"WEGA, a German consumer electronics company, was frog's first major client. Frog designed their first color TV without a wood frame."},
  {q:"Which major electronics company acquired WEGA in 1974, leading to frog's international expansion?",o:["Philips","Samsung","Sony","Panasonic"],a:2,e:"Sony acquired WEGA in 1974 and subsequently hired Esslinger to create a global design image, leading to work on 100+ Sony products."},
  {q:"What nickname was given to the Sun SPARCstation 1 designed by frog?",o:["The Cube","The Pizza Box","The Slab","The Wedge"],a:1,e:"The SPARCstation 1's distinctive 3-inch height earned it the 'pizza box' nickname. It sold 120,000 units in its first 18 months."},
  {q:"What was the Yamaha FZ750 motorcycle concept designed by frog called?",o:["The Dart","The Rana","The Wave","The Blade"],a:1,e:"'The Rana' — meaning 'frog' in Latin — was a clever nod to the company name. The prototype was later donated to SFMOMA."},
  {q:"What Disney product did frog help design?",o:["Disney+ streaming interface","MagicBand wristband","Disneyland mobile app","Disney Infinity figures"],a:1,e:"Frog was the lead design partner for Disney's MagicBand and MyMagic+ system — an RFID bracelet connecting park tickets, hotel keys, payments, and PhotoPass."},
  {q:"What SAP product did frog help redesign with a human-centered approach?",o:["SAP HANA","SAP Fiori","SAP SuccessFactors","SAP Ariba"],a:1,e:"Frog led the radically human-centered redesign of SAP Fiori, transforming SAP's flagship enterprise application."},
  {q:"Approximately how many Sony products did frog design during their partnership?",o:["About 25","About 50","Over 100","Over 200"],a:2,e:"Frog designed over 100 products for Sony, emphasizing high-tech minimalism and ergonomic appeal across their entire product range."},
  {q:"Which museum acquired the original Apple IIc?",o:["MoMA","The Smithsonian","Whitney Museum of Art","Cooper Hewitt"],a:2,e:"The original Apple IIc was acquired by the Whitney Museum of Art in New York, recognizing its significance as both technology and design."},
  {q:"Which frog-designed Apple product is in MoMA's permanent collection?",o:["Apple IIc","Macintosh SE","Apple Lisa","Power Mac G3"],a:1,e:"The Macintosh SE (1987, designed 1984) is part of MoMA's permanent collection in New York."},
  {q:"Who acquired frog from its founders in 2004?",o:["Capgemini","Accenture","Flextronics","McKinsey"],a:2,e:"Hartmut Esslinger and Patricia Roller sold their majority stake to Flextronics for approximately $25 million in 2004."},
  {q:"Which private equity firm acquired frog as part of a $900 million deal in 2006?",o:["Bain Capital","KKR","Blackstone","Carlyle Group"],a:1,e:"KKR (Kohlberg Kravis Roberts) acquired frog as part of their $900 million acquisition of Flextronics' software companies."},
  {q:"Frog is currently part of which global consulting firm?",o:["Deloitte","Accenture","Capgemini","McKinsey"],a:2,e:"Frog became part of Capgemini Invent in 2021, after Capgemini acquired Altran (which owned Aricent, which owned frog)."},
  {q:"In what year did frog rebrand from 'frog design' to simply 'frog'?",o:["2005","2008","2011","2015"],a:2,e:"In 2011, the company dropped 'design' from its name to signify its expanded portfolio beyond design into strategy, services, and organization activation."},
  {q:"In what year did frog celebrate its 50th anniversary?",o:["2015","2017","2019","2021"],a:2,e:"Frog celebrated frog50 in 2019, commemorating its 1969 founding with traveling exhibitions featuring 50 iconic products."},
  {q:"What did frog's 50th anniversary exhibition feature?",o:["A documentary film","50 iconic products and a 24-foot video wall","A redesigned website","A coffee table book"],a:1,e:"The frog50 exhibition featured 50 iconic products, a 24-foot-wide video wall with an animated timeline, and an AR wall with image-tracking."},
  {q:"What famous designer played a similar role at Braun to what Esslinger played at Apple?",o:["Charles Eames","Philippe Starck","Dieter Rams","Massimo Vignelli"],a:2,e:"Steve Jobs sought a 'world-class designer' similar to the role Dieter Rams played for Braun. Esslinger filled that role for Apple."},
  {q:"What formula did Esslinger propose for business success through design?",o:["Design + Engineering = Innovation","Culture + Process = Profits","Vision + Execution = Growth","Art + Science = Products"],a:1,e:"Esslinger's formula 'Culture + Process = Profits' encapsulates his belief that design-led culture drives business results."},
